<!DOCTYPE html>
<html lang="en">
<head>
    <title>新增博客文章</title>
    {% include 'system/common/header.html' %}
    {{ ckeditor.load(version="4.22.1") }}
    <script src="{{ url_for('static', filename='node_modules/jquery/dist/jquery.js') }}"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/layer/3.5.1/layer.js"></script>
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <form class="layui-form" lay-filter="blog-add-form" action="{{ url_for('system.post.save') }}" method="post">
            <div class="layui-form-item">
                <label class="layui-form-label">文章标题</label>
                <div class="layui-input-block">
                    <input type="text" name="title" lay-verify="required|title" autocomplete="off"
                           placeholder="请输入文章标题" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">文章内容</label>
                <div class="layui-input-block">
                    {{ ckeditor.create(name='article') }}
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button type="submit" class="pear-btn pear-btn-primary pear-btn-sm">
                        <i class="layui-icon layui-icon-ok"></i> 提交
                    </button>
                    <button type="reset" class="pear-btn pear-btn-sm">
                        <i class="layui-icon layui-icon-refresh"></i> 重置
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

{% include 'system/common/footer.html' %}
{{ ckeditor.config(name='article', versionCheck=false) }}

<script>
    layui.use(['form', 'jquery'], function () {
        let form = layui.form;
        let layer = layui.layer;
        // 提交文章保存
        form.on('submit', function (data) {
            $.ajax({
                url: '{{ url_for('system.post.save') }}',
                type: 'post',
                data: new FormData(document.querySelector('form')),
                processData: false,
                contentType: false,
                success: function (res) {
                    if (res.success) {
                        layer.msg('发布成功', {icon: 1, time: 1000}, function () {
                            window.parent.location.reload();
                        });
                    } else {
                        layer.msg('发布失败：' + res.msg, {icon: 2, time: 2000});
                    }
                },
                error: function () {
                    layer.msg("提交失败，请检查网络或重试", {icon: 2, time: 1500});
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
