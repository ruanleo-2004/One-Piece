<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>编辑新闻文章</title>
    {% include 'system/common/header.html' %}
    {{ ckeditor.load(version="4.22.1") }}
    <script src="{{ url_for('static', filename='node_modules/jquery/dist/jquery.js') }}"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/layer/3.5.1/layer.js"></script>
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <form class="layui-form" lay-filter="news-edit-form" action="">
            <div class="layui-form-item">
                <label class="layui-form-label">标题</label>
                <div class="layui-input-block">
                    <input type="text" name="title" required lay-verify="required" placeholder="请输入标题"
                           autocomplete="off" class="layui-input" value="{{ article.title }}">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">分类</label>
                <div class="layui-input-block">
                    <input type="text" name="category_name" placeholder="请输入分类"
                           autocomplete="off" class="layui-input" value="{{ article.category_name }}">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">内容</label>
                <div class="layui-input-block">
                    {{ ckeditor.create(value=article.article,name='article') }}
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">发布日期</label>
                <div class="layui-input-block">
                    <input type="date" name="release_date" class="layui-input"
                           value="{{ article.release_date.strftime('%Y-%m-%d') if article.release_date else '' }}">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">是否为最新</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="is_new" lay-skin="switch" lay-text="是|否"
                           {% if article.is_new %}checked{% endif %}>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">封面图片</label>
                <div class="layui-input-block">
                    {% if article.cover %}
                        <img src="{{ article.cover }}" alt="封面图片"
                             style="max-width: 200px; margin-bottom: 10px;">
                    {% endif %}
                    <input type="file" name="cover" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button type="submit" class="pear-btn pear-btn-primary">保存</button>
                    <button type="button" class="pear-btn pear-btn-secondary" onclick="history.back()">取消</button>
                </div>
            </div>
        </form>
    </div>
</div>

{% include 'system/common/footer.html' %}
{{ ckeditor.config(name='article',versionCheck = false) }}
<script>

    layui.use(['form', 'layer'], function () {
        let form = layui.form;
        let layer = layui.layer;

        // 提交表单处理
        form.on('submit', function (data) {
            $.ajax({
                url: "{{ url_for('system.news_article.update', id=article.id) }}",
                type: 'POST',
                data: new FormData(document.querySelector('form')),
                processData: false,
                contentType: false,
                success: function (res) {
                    if (res.success) {
                        layer.msg('更新成功', {icon: 1, time: 1000}, function () {
                            window.parent.location.reload();
                        });
                    } else {
                        layer.msg('更新失败：' + res.msg, {icon: 2, time: 2000});
                    }
                }
            });

            return false; // 阻止默认表单提交
        });
    });
</script>
</body>
</html>
