<!DOCTYPE html>
<html>
<head>
    <title>最新情报管理</title>
    {% include 'system/common/header.html' %}
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <form class="layui-form" action="">
            <div class="layui-form-item">
                <label class="layui-form-label">情报标题</label>
                <div class="layui-input-inline">
                    <input type="text" name="title" placeholder="输入情报标题" class="layui-input">
                </div>
                <button class="pear-btn pear-btn-md pear-btn-primary" lay-submit lay-filter="news-query">
                    <i class="layui-icon layui-icon-search"></i>
                    查询
                </button>
                <button type="reset" class="pear-btn pear-btn-md">
                    <i class="layui-icon layui-icon-refresh"></i>
                    重置
                </button>
            </div>
        </form>
    </div>
</div>
<div class="layui-card">
    <div class="layui-card-body">
        <table id="news-table" lay-filter="news-table"></table>
    </div>
</div>

<script type="text/html" id="news-toolbar">
    <button class="pear-btn pear-btn-primary pear-btn-md" lay-event="add">
        <i class="layui-icon layui-icon-add-1"></i>
        新增情报
    </button>
</script>

<script type="text/html" id="news-bar">
    <button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="edit"><i class="layui-icon layui-icon-edit"></i> 编辑
    </button>
    <button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="remove"><i class="layui-icon layui-icon-delete"></i>
        删除
    </button>
</script>

{% include 'system/common/footer.html' %}
<script>
    layui.use(['table', 'form', 'jquery', 'layer'], function () {
        let table = layui.table;
        let form = layui.form;
        let $ = layui.jquery;

        let MODULE_PATH = '/system/news/';

        table.render({
            elem: '#news-table',
            url: MODULE_PATH + 'data',
            page: true,
            cols: [
                [
                    {title: 'ID', field: 'id', align: 'center', width: 80},
                    {title: '标题', field: 'title', align: 'center', width: 200},
                    {title: '分类', field: 'category_name', align: 'center', width: 150},
                    {title: '发布日期', field: 'release_date', align: 'center', width: 150},
                    {title: '操作', toolbar: '#news-bar', align: 'center', width: 300}
                ]
            ],
            toolbar: '#news-toolbar',
            defaultToolbar: ['filter', 'print', 'exports']
        });

        table.on('toolbar(news-table)', function (obj) {
            if (obj.event === 'add') {
                window.add();
            }
        });

        table.on('tool(news-table)', function (obj) {
            if (obj.event === 'edit') {
                window.edit(obj);
            } else if (obj.event === 'remove') {
                window.remove(obj);
            }
        });

        window.add = function () {
            layer.open({
                type: 2,
                title: '新增情报',
                area: ['800px', '600px'],
                content: MODULE_PATH + 'add'
            });
        };

        window.edit = function (obj) {
            layer.open({
                type: 2,
                title: '编辑新闻',
                area: ['800px', '600px'],
                content: MODULE_PATH + 'edit/' + obj.data.id
            });
        };

        window.remove = function (obj) {
            layer.confirm('确定要删除这条新闻吗？', {icon: 3, title: '提示'}, function (index) {
                $.ajax({
                    url: MODULE_PATH + 'remove/' + obj.data.id,
                    type: 'delete',
                    success: function (res) {
                        if (res.success) {
                            layer.msg('删除成功', {icon: 1});
                            obj.del();
                        } else {
                            layer.msg('删除失败', {icon: 2});
                        }
                    }
                });
                layer.close(index);
            });
        };
    });
</script>
</body>
</html>
