<!DOCTYPE html>
<html>
<head>
    <title>博客管理</title>
    {% include 'system/common/header.html' %}
</head>
<body class="pear-container">
<div class="layui-card">
    <div class="layui-card-body">
        <form class="layui-form" action="">
            <div class="layui-form-item">
                <label class="layui-form-label">文章标题</label>
                <div class="layui-input-inline">
                    <input type="text" name="title" placeholder="输入文章标题" class="layui-input">
                </div>
                <label class="layui-form-label">作者</label>
                <div class="layui-input-inline">
                    <input type="text" name="author" placeholder="输入作者名称" class="layui-input">
                </div>
                <button class="pear-btn pear-btn-md pear-btn-primary" lay-submit lay-filter="post-query">
                    <i class="layui-icon layui-icon-search"></i>
                    查询
                </button>
                <button type="reset" class="pear-btn pear-btn-md">
                    <i class="layui-icon layui-icon-refresh"></i>
                    重置
                </button>
            </div>
        </form>
    </div>
</div>
<div class="layui-card">
    <div class="layui-card-body">
        <table id="post-table" lay-filter="post-table"></table>
    </div>
</div>

<script type="text/html" id="post-toolbar">
    <button class="pear-btn pear-btn-primary pear-btn-md" lay-event="add">
        <i class="layui-icon layui-icon-add-1"></i>
        新增文章
    </button>
</script>

<script type="text/html" id="post-bar">
    <button class="pear-btn pear-btn-primary pear-btn-sm" lay-event="edit"><i class="layui-icon layui-icon-edit"></i> 编辑
    </button>
    <button class="pear-btn pear-btn-danger pear-btn-sm" lay-event="remove"><i class="layui-icon layui-icon-delete"></i>
        删除
    </button>
</script>

{% include 'system/common/footer.html' %}
<script>
    layui.use(['table', 'form', 'jquery', 'layer'], function () {
        let table = layui.table
        let form = layui.form
        let $ = layui.jquery

        let MODULE_PATH = '/blog/home/post/'

        // 表格列配置
        let cols = [
            [
                {title: 'ID', field: 'id', align: 'center', width: 80},
                {title: '标题', field: 'title', align: 'center', width: 200},
                {title: '作者', field: 'author', align: 'center', width: 150},
                {title: '发布时间', field: 'date_posted', align: 'center', width: 180},
                {title: '操作', toolbar: '#post-bar', align: 'center', width: 300}
            ]
        ]

        // 渲染表格
        table.render({
            elem: '#post-table',
            url: MODULE_PATH + 'data',
            page: true,
            cols: cols,
            skin: 'line',
            toolbar: '#post-toolbar',
            defaultToolbar: ['filter', 'print', 'exports']
        })

        // 工具条事件监听
        table.on('tool(post-table)', function (obj) {
            if (obj.event === 'remove') {
                window.remove(obj)
            } else if (obj.event === 'edit') {
                window.edit(obj)
            }
        })

        table.on('toolbar(post-table)', function (obj) {
            if (obj.event === 'add') {
                window.add()
            }
        })

        form.on('submit(post-query)', function (data) {
            table.reload('post-table', {where: data.field})
            return false
        })

        // 新增文章
        window.add = function () {
            layer.open({
                type: 2,
                title: '新增文章',
                shade: 0.1,
                area: ['800px', '600px'],
                content: MODULE_PATH + 'add'
            })
        }

        // 编辑文章
        window.edit = function (obj) {
            layer.open({
                type: 2,
                title: '编辑文章',
                shade: 0.1,
                area: ['800px', '600px'],
                content: MODULE_PATH + 'edit/' + obj.data.id
            })
        }

        // 删除文章
        window.remove = function (obj) {
            layer.confirm('确定要删除该文章吗？', {icon: 3, title: '提示'}, function (index) {
                layer.close(index)
                $.ajax({
                    url: MODULE_PATH + 'remove/' + obj.data.id,
                    type: 'delete',
                    success: function (result) {
                        if (result.success) {
                            layer.msg('删除成功', {icon: 1, time: 1000}, function () {
                                obj.del()
                            })
                        } else {
                            layer.msg('删除失败', {icon: 2, time: 1000})
                        }
                    }
                })
            })
        }
    })
</script>
</body>
</html>
